# One command to run the whole product:  docker compose -f deploy/docker-compose.yml up --build
# Then open the dashboard at http://localhost:8090 (API at http://localhost:8080).
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: apiguard
      POSTGRES_USER: apiguard
      POSTGRES_PASSWORD: ${DB_PASSWORD:-apiguard}
    ports:
      - "5432:5432"
    volumes:
      - apiguard-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apiguard"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build:
      context: ..
      dockerfile: server/Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://db:5432/apiguard
      DB_USER: apiguard
      DB_PASSWORD: ${DB_PASSWORD:-apiguard}
      SPRING_PROFILES_ACTIVE: default
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      APIGUARD_WEBHOOK_SPEC_PATH: ${APIGUARD_WEBHOOK_SPEC_PATH:-}
      APIGUARD_WEBHOOK_API_NAME: ${APIGUARD_WEBHOOK_API_NAME:-}
    ports:
      - "8080:8080"

  dashboard:
    build:
      context: ..
      dockerfile: dashboard/Dockerfile
      args:
        # The browser talks to the server directly, so point it at the host-exposed API.
        APIGUARD_API: ${APIGUARD_API:-http://localhost:8080}
    depends_on:
      - server
    ports:
      - "8090:80"

volumes:
  apiguard-pg:
